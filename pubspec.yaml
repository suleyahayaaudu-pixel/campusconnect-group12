name: campusconnect
description: CampusConnect - Campus Services Platform Group 12

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_messaging: ^14.7.9
  geolocator: ^10.1.0
  sqflite: ^2.4.3
  path: ^1.9.1
  http: ^1.1.0
  provider: ^6.1.1
  local_auth: ^2.1.8
  web_socket_channel: ^2.4.0
  flutter_local_notifications: ^16.1.0
  google_maps_flutter: ^2.5.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/config.json
  